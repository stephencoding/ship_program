    <script>
        const prd = "## 1. 产品概述\n船舶交通流AIS可视化平台是一个基于Web的SAAS解决方案，专为海事局通航选址分析设计。平台集成AIS数据可视化、船舶动态监控、交通流分析预测等功能，为海事管理部门和航运企业提供专业的船舶交通分析服务。\n\n通过网页端操作实现数据出图效果，支持在线向客户展示分析结果，同时提供小型化的船讯网功能端，支持网页版和APP小程序访问。\n\n## 2. 核心功能\n\n### 2.1 用户角色\n| 角色 | 注册方式 | 核心权限 |\n|------|----------|----------|\n| 普通用户 | 邮箱注册 | 浏览基础船舶信息、查询船舶轨迹 |\n| 专业用户 | 付费升级 | 使用分析工具、导出报告、预测功能 |\n| 企业用户 | 企业认证 | 多账号管理、API接入、定制服务 |\n| 管理员 | 内部创建 | 系统管理、用户管理、数据配置 |\n\n### 2.2 功能模块\n平台包含以下核心页面：\n1. **首页**: 全球船舶实时分布图、搜索功能、快捷工具入口\n2. **船舶详情页**: 船舶基本信息、实时动态、历史轨迹\n3. **分析工具页**: 交通流分析、距离测量、面积测量、气象水文\n4. **预测推演页**: 基于历史数据的交通流预测、航线规划\n5. **用户中心**: 个人设置、关注船舶、标记管理、使用记录\n6. **数据报告页**: 分析报告生成、数据导出、图表展示\n\n### 2.3 页面详情\n| 页面名称 | 模块名称 | 功能描述 |\n|----------|----------|----------|\n| 首页 | 全球地图 | 显示世界地图，实时展示船舶位置分布，支持缩放和拖拽 |\n| 首页 | 搜索栏 | 支持按船名、呼号、MMSI、IMO、港口等条件搜索船舶 |\n| 首页 | 工具面板 | 提供测量工具、图层控制、筛选器等快捷功能入口 |\n| 首页 | 船舶列表 | 显示当前可视区域内的船舶列表，支持排序和筛选 |\n| 船舶详情页 | 基本信息 | 展示船舶名称、类型、尺寸、国籍、所属公司等基础信息 |\n| 船舶详情页 | 实时动态 | 显示当前位置、航向、航速、状态等实时数据 |\n| 船舶详情页 | 轨迹回放 | 支持选择时间段回放船舶历史航行轨迹 |\n| 船舶详情页 | 周边船舶 | 显示周边一定范围内的其他船舶分布情况 |\n| 分析工具页 | 距离测量 | 在地图上测量两点或多点间的航线距离 |\n| 分析工具页 | 面积测量 | 测量海域区域面积，支持多边形绘制 |\n| 分析工具页 | 气象水文 | 叠加显示气象数据（风向、风速）和水文信息 |\n| 分析工具页 | 交通流分析 | 分析特定区域的船舶交通密度和流量分布 |\n| 预测推演页 | 历史数据分析 | 基于1-3年历史数据进行交通流趋势分析 |\n| 预测推演页 | 未来预测 | 预测未来几年的交通流分布变化情况 |\n| 预测推演页 | 航线优化 | 根据预测结果提供航线规划建议 |\n| 用户中心 | 我的关注 | 管理用户关注的船舶和区域 |\n| 用户中心 | 我的标记 | 管理在地图上添加的自定义标记点 |\n| 用户中心 | 使用记录 | 查看功能使用历史和生成的报告记录 |\n| 数据报告页 | 报告生成 | 根据分析结果生成专业的数据报告 |\n| 数据报告页 | 数据导出 | 支持导出图表、数据表格等分析结果 |\n| 数据报告页 | 报告模板 | 提供多种报告模板供用户选择 |\n\n## 3. 核心流程\n\n### 3.1 用户访问流程\n用户访问平台 → 浏览全球船舶分布 → 搜索特定船舶 → 查看船舶详情 → 使用分析工具 → 生成报告 → 导出数据\n\n### 3.2 交通流分析流程\n选择分析区域 → 设置时间范围 → 选择分析维度 → 运行分析算法 → 查看分析结果 → 导出分析报告\n\n### 3.3 预测推演流程\n选择历史数据范围 → 配置预测参数 → 运行预测算法 → 查看预测结果 → 对比历史趋势 → 生成预测报告\n\n```mermaid\ngraph TD\n    A[首页] --> B[船舶搜索]\n    A --> C[分析工具]\n    A --> D[船舶列表]\n    B --> E[船舶详情页]\n    D --> E\n    E --> F[轨迹回放]\n    E --> G[周边分析]\n    C --> H[距离测量]\n    C --> I[面积测量]\n    C --> J[交通流分析]\n    J --> K[预测推演页]\n    K --> L[报告生成]\n    C --> M[气象水文]\n    A --> N[用户中心]\n    N --> O[我的关注]\n    N --> P[我的标记]\n```\n\n## 4. 用户界面设计\n\n### 4.1 设计风格\n- **主色调**: 深海蓝(#1f3b6d)为主导航栏背景，配合白色文字\n- **强调色**: 亮蓝色(#1976d2)用于按钮和重要操作元素\n- **数据点**: 绿色(#12b312)表示船舶位置点\n- **背景色**: 浅米色陆地配合中蓝色海洋的地图配色\n- **按钮样式**: 扁平化设计，主要按钮使用圆角矩形\n- **字体**: 简体中文为主，主要使用14-16px字体大小\n- **布局**: 左侧地图主区域，右侧可折叠工具面板\n- **图标风格**: 简洁的线性图标，符合海事主题\n\n### 4.2 页面设计概述\n| 页面名称 | 模块名称 | UI元素 |\n|----------|----------|--------|\n| 首页 | 导航栏 | 深蓝色背景，白色文字，包含logo、主要功能菜单和用户入口 |\n| 首页 | 搜索区域 | 白色搜索框，蓝色搜索按钮，占位符文字为灰色 |\n| 首页 | 地图区域 | 占据主要空间，显示世界地图和船舶分布，支持缩放和拖拽 |\n| 首页 | 工具面板 | 右侧白色面板，包含分组的功能图标和文字说明 |\n| 首页 | 状态栏 | 左下角半透明灰色面板，显示当前坐标、比例尺等信息 |\n| 船舶详情页 | 信息卡片 | 白色背景卡片，分组显示船舶各类信息 |\n| 船舶详情页 | 轨迹控制 | 时间轴控制器，支持播放、暂停、快进等操作 |\n| 分析工具页 | 工具栏 | 顶部工具栏，包含各种分析工具的切换按钮 |\n| 分析工具页 | 结果展示 | 地图叠加层显示分析结果，侧边栏显示详细数据 |\n| 预测推演页 | 参数设置 | 左侧设置面板，可配置预测的时间范围和算法参数 |\n| 预测推演页 | 结果对比 | 分屏或图层切换显示历史数据和预测结果 |\n\n### 4.3 响应式设计\n- **桌面优先**: 主要面向桌面端用户设计，充分利用大屏幕空间\n- **移动端适配**: 支持平板和手机访问，采用响应式布局\n- **触摸优化**: 移动端支持触摸手势操作地图\n- **自适应布局**: 根据屏幕尺寸自动调整面板位置和大小\n\n### 4.4 地图可视化规范\n- **坐标显示**: 支持多种坐标格式（DDM、DMS、Decimal）\n- **比例尺**: 动态显示当前地图比例尺\n- **图层控制**: 支持切换不同的地图底图和数据图层\n- **数据密度**: 根据缩放级别自动调整船舶点的显示密度\n- **交互反馈**: 鼠标悬停显示船舶基本信息，点击显示详细信息";
        const arch = "## 1. 架构设计\n\n```mermaid\ngraph TD\n    A[用户浏览器] --> B[React前端应用]\n    A --> C[微信小程序]\n    B --> D[Supabase客户端]\n    C --> D\n    D --> E[Supabase服务]\n    B --> F[地图服务API]\n    B --> G[气象数据API]\n    B --> H[AI预测服务]\n    \n    subgraph \"前端层\"\n        B\n        C\n    end\n    \n    subgraph \"服务层\"\n        E\n        F\n        G\n        H\n    end\n    \n    subgraph \"外部服务\"\n        I[AIS数据源]\n        J[地图服务商]\n        K[气象服务商]\n    end\n```\n\n## 2. 技术描述\n\n- **前端**: React@18 + TypeScript + TailwindCSS@3 + Vite\n- **初始化工具**: vite-init\n- **后端**: Supabase (BaaS)\n- **地图引擎**: Leaflet + React-Leaflet (2D) / Three.js (3D场景)\n- **状态管理**: React Context + Zustand\n- **UI组件库**: Ant Design + 自定义组件\n- **小程序**: 微信小程序原生开发\n- **AI服务**: Python FastAPI (预测算法)\n\n## 3. 路由定义\n\n| 路由 | 用途 |\n|-------|---------|\n| / | 首页，全球船舶实时分布图 |\n| /search | 船舶搜索页面 |\n| /vessel/:id | 船舶详情页面 |\n| /analysis | 分析工具页面 |\n| /prediction | 预测推演页面 |\n| /report | 数据报告页面 |\n| /user/profile | 用户个人中心 |\n| /user/favorites | 我的关注 |\n| /user/markers | 我的标记 |\n| /auth/login | 登录页面 |\n| /auth/register | 注册页面 |\n| /auth/reset | 密码重置页面 |\n\n## 4. API定义\n\n### 4.1 船舶数据API\n\n**获取船舶实时位置**\n```\nGET /api/vessels/realtime\n```\n\n请求参数:\n| 参数名 | 类型 | 必需 | 描述 |\n|--------|------|------|------|\n| bounds | string | 否 | 地图边界坐标 (sw_lng,sw_lat,ne_lng,ne_lat) |\n| zoom | number | 否 | 地图缩放级别 |\n| vessel_types | array | 否 | 船舶类型筛选 |\n| time_range | string | 否 | 时间范围筛选 |\n\n响应:\n```json\n{\n  \"vessels\": [\n    {\n      \"id\": \"vessel_123\",\n      \"name\": \"COSCO SHIPPING\",\n      \"mmsi\": \"123456789\",\n      \"imo\": \"9876543\",\n      \"position\": {\n        \"latitude\": 31.2304,\n        \"longitude\": 121.4737\n      },\n      \"course\": 123.5,\n      \"speed\": 15.2,\n      \"heading\": 125,\n      \"status\": \"underway\",\n      \"last_update\": \"2024-01-15T10:30:00Z\",\n      \"destination\": \"Shanghai\",\n      \"eta\": \"2024-01-16T08:00:00Z\"\n    }\n  ],\n  \"total\": 1250,\n  \"timestamp\": \"2024-01-15T10:35:00Z\"\n}\n```\n\n**获取船舶历史轨迹**\n```\nGET /api/vessels/:id/trajectory\n```\n\n请求参数:\n| 参数名 | 类型 | 必需 | 描述 |\n|--------|------|------|------|\n| start_time | string | 是 | 开始时间 (ISO 8601) |\n| end_time | string | 是 | 结束时间 (ISO 8601) |\n| interval | number | 否 | 采样间隔 (分钟) |\n\n### 4.2 分析工具API\n\n**交通流分析**\n```\nPOST /api/analysis/traffic-flow\n```\n\n请求:\n```json\n{\n  \"area\": {\n    \"type\": \"polygon\",\n    \"coordinates\": [[...]]\n  },\n  \"time_range\": {\n    \"start\": \"2024-01-01T00:00:00Z\",\n    \"end\": \"2024-01-31T23:59:59Z\"\n  },\n  \"analysis_type\": \"density\",\n  \"grid_size\": 0.1\n}\n```\n\n响应:\n```json\n{\n  \"analysis_id\": \"analysis_456\",\n  \"status\": \"completed\",\n  \"result\": {\n    \"density_map\": \"url_to_density_tile_layer\",\n    \"statistics\": {\n      \"total_vessels\": 1250,\n      \"average_density\": 15.3,\n      \"peak_hours\": [\"08:00\", \"18:00\"]\n    }\n  },\n  \"generated_at\": \"2024-01-15T10:35:00Z\"\n}\n```\n\n**距离测量**\n```\nPOST /api/analysis/distance\n```\n\n请求:\n```json\n{\n  \"points\": [\n    {\"lat\": 31.2304, \"lng\": 121.4737},\n    {\"lat\": 32.0603, \"lng\": 118.7969}\n  ],\n  \"measure_type\": \"sea_route\"\n}\n```\n\n### 4.3 预测API\n\n**交通流预测**\n```\nPOST /api/prediction/traffic-flow\n```\n\n请求:\n```json\n{\n  \"historical_years\": 3,\n  \"prediction_years\": 2,\n  \"region\": {\n    \"type\": \"rectangle\",\n    \"bounds\": [120.0, 30.0, 125.0, 35.0]\n  },\n  \"model_parameters\": {\n    \"seasonality\": true,\n    \"trend\": true,\n    \"external_factors\": [\"economic\", \"weather\"]\n  }\n}\n```\n\n## 5. 数据模型\n\n### 5.1 数据库实体关系\n\n```mermaid\nerDiagram\n    USERS ||--o{ FAVORITE_VESSELS : marks\n    USERS ||--o{ CUSTOM_MARKERS : creates\n    USERS ||--o{ ANALYSIS_REPORTS : generates\n    VESSELS ||--o{ TRAJECTORY_POINTS : has\n    VESSELS ||--o{ VESSEL_EVENTS : records\n    ANALYSIS_REPORTS ||--o{ REPORT_LAYERS : contains\n\n    USERS {\n        uuid id PK\n        string email UK\n        string password_hash\n        string name\n        string role\n        json profile_data\n        timestamp created_at\n        timestamp updated_at\n    }\n    \n    VESSELS {\n        uuid id PK\n        string mmsi UK\n        string imo\n        string name\n        string call_sign\n        string vessel_type\n        int length\n        int width\n        string flag_country\n        json static_info\n        timestamp created_at\n        timestamp updated_at\n    }\n    \n    TRAJECTORY_POINTS {\n        uuid id PK\n        uuid vessel_id FK\n        decimal latitude\n        decimal longitude\n        decimal course\n        decimal speed\n        decimal heading\n        string status\n        timestamp timestamp\n        json metadata\n    }\n    \n    FAVORITE_VESSELS {\n        uuid id PK\n        uuid user_id FK\n        uuid vessel_id FK\n        string group_name\n        timestamp created_at\n    }\n    \n    CUSTOM_MARKERS {\n        uuid id PK\n        uuid user_id FK\n        string name\n        decimal latitude\n        decimal longitude\n        string marker_type\n        json properties\n        timestamp created_at\n    }\n    \n    ANALYSIS_REPORTS {\n        uuid id PK\n        uuid user_id FK\n        string report_type\n        json parameters\n        json results\n        string status\n        timestamp generated_at\n        timestamp expires_at\n    }\n    \n    VESSEL_EVENTS {\n        uuid id PK\n        uuid vessel_id FK\n        string event_type\n        json event_data\n        timestamp occurred_at\n        string source\n    }\n```\n\n### 5.2 数据定义语言\n\n**用户表 (users)**\n```sql\n-- 创建用户表\nCREATE TABLE users (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    email VARCHAR(255) UNIQUE NOT NULL,\n    password_hash VARCHAR(255) NOT NULL,\n    name VARCHAR(100) NOT NULL,\n    role VARCHAR(20) DEFAULT 'user' CHECK (role IN ('user', 'professional', 'enterprise', 'admin')),\n    profile_data JSONB DEFAULT '{}',\n    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),\n    updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()\n);\n\n-- 创建索引\nCREATE INDEX idx_users_email ON users(email);\nCREATE INDEX idx_users_role ON users(role);\n```\n\n**船舶表 (vessels)**\n```sql\n-- 创建船舶表\nCREATE TABLE vessels (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    mmsi VARCHAR(9) UNIQUE NOT NULL,\n    imo VARCHAR(7),\n    name VARCHAR(255) NOT NULL,\n    call_sign VARCHAR(10),\n    vessel_type VARCHAR(50),\n    length INTEGER,\n    width INTEGER,\n    flag_country VARCHAR(3),\n    static_info JSONB DEFAULT '{}',\n    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),\n    updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()\n);\n\n-- 创建索引\nCREATE INDEX idx_vessels_mmsi ON vessels(mmsi);\nCREATE INDEX idx_vessels_name ON vessels(name);\nCREATE INDEX idx_vessels_type ON vessels(vessel_type);\n```\n\n**轨迹点表 (trajectory_points)**\n```sql\n-- 创建轨迹点表\nCREATE TABLE trajectory_points (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    vessel_id UUID NOT NULL REFERENCES vessels(id),\n    latitude DECIMAL(10,7) NOT NULL,\n    longitude DECIMAL(10,7) NOT NULL,\n    course DECIMAL(5,1),\n    speed DECIMAL(5,1),\n    heading DECIMAL(5,1),\n    status VARCHAR(20),\n    timestamp TIMESTAMP WITH TIME ZONE NOT NULL,\n    metadata JSONB DEFAULT '{}',\n    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()\n);\n\n-- 创建索引\nCREATE INDEX idx_trajectory_vessel_time ON trajectory_points(vessel_id, timestamp DESC);\nCREATE INDEX idx_trajectory_location ON trajectory_points USING GIST (\n    ST_MakePoint(longitude, latitude)\n);\nCREATE INDEX idx_trajectory_timestamp ON trajectory_points(timestamp DESC);\n```\n\n**分析报告表 (analysis_reports)**\n```sql\n-- 创建分析报告表\nCREATE TABLE analysis_reports (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    user_id UUID NOT NULL REFERENCES users(id),\n    report_type VARCHAR(50) NOT NULL,\n    parameters JSONB NOT NULL,\n    results JSONB,\n    status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending', 'processing', 'completed', 'failed')),\n    generated_at TIMESTAMP WITH TIME ZONE,\n    expires_at TIMESTAMP WITH TIME ZONE,\n    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()\n);\n\n-- 创建索引\nCREATE INDEX idx_reports_user ON analysis_reports(user_id);\nCREATE INDEX idx_reports_type ON analysis_reports(report_type);\nCREATE INDEX idx_reports_status ON analysis_reports(status);\nCREATE INDEX idx_reports_created ON analysis_reports(created_at DESC);\n```\n\n### 5.3 Supabase权限配置\n\n```sql\n-- 授予匿名用户基础读取权限\nGRANT SELECT ON vessels TO anon;\nGRANT SELECT ON trajectory_points TO anon;\n\n-- 授予认证用户完整权限\nGRANT ALL PRIVILEGES ON users TO authenticated;\nGRANT ALL PRIVILEGES ON vessels TO authenticated;\nGRANT ALL PRIVILEGES ON trajectory_points TO authenticated;\nGRANT ALL PRIVILEGES ON favorite_vessels TO authenticated;\nGRANT ALL PRIVILEGES ON custom_markers TO authenticated;\nGRANT ALL PRIVILEGES ON analysis_reports TO authenticated;\n\n-- 创建行级安全策略\nALTER TABLE users ENABLE ROW LEVEL SECURITY;\nALTER TABLE favorite_vessels ENABLE ROW LEVEL SECURITY;\nALTER TABLE custom_markers ENABLE ROW LEVEL SECURITY;\nALTER TABLE analysis_reports ENABLE ROW LEVEL SECURITY;\n\n-- 用户只能查看和修改自己的数据\nCREATE POLICY users_own_data ON users FOR ALL USING (auth.uid() = id);\nCREATE POLICY favorites_own_data ON favorite_vessels FOR ALL USING (auth.uid() = user_id);\nCREATE POLICY markers_own_data ON custom_markers FOR ALL USING (auth.uid() = user_id);\nCREATE POLICY reports_own_data ON analysis_reports FOR ALL USING (auth.uid() = user_id);\n```\n\n## 6. AI预测服务架构\n\n### 6.1 预测服务设计\n```mermaid\ngraph TD\n    A[前端请求] --> B[API网关]\n    B --> C[预测服务]\n    C --> D[数据预处理]\n    D --> E[模型推理]\n    E --> F[结果后处理]\n    F --> G[响应返回]\n    \n    C --> H[历史数据]\n    H --> I[时序数据库]\n    \n    E --> J[机器学习模型]\n    J --> K[模型仓库]\n    \n    subgraph \"预测服务层\"\n        C\n        D\n        E\n        F\n    end\n    \n    subgraph \"数据层\"\n        H\n        I\n    end\n    \n    subgraph \"模型层\"\n        J\n        K\n    end\n```\n\n### 6.2 核心算法模块\n- **时序分析**: LSTM、Prophet用于交通流趋势预测\n- **空间分析**: 基于密度的聚类算法(DBSCAN)识别热点区域\n- **机器学习**: Random Forest、XGBoost用于特征重要性分析\n- **深度学习**: GNN图神经网络用于航线预测\n\n### 6.3 模型部署\n- **容器化**: Docker容器部署预测服务\n- **模型版本**: MLflow进行模型版本管理\n- **A/B测试**: 支持多模型并行测试\n- **监控告警**: 模型性能实时监控";

        const fullContent = "# 产品需求文档 (PRD)\n\n" + prd + "\n\n# 技术架构文档\n\n" + arch;
